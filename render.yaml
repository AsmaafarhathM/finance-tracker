# Render Blueprint: https://render.com/docs/blueprint-spec
# After first deploy, set secret env vars in the Render dashboard (DB_*, JWT_SECRET).

services:
  - type: web
    name: finance-tracker-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
