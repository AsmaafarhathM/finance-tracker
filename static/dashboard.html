<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Finance Tracker — Dashboard</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4d;
      --text: #e8edf4;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
      --income: #22c55e;
      --expense: #ef4444;
      --balance: #a78bfa;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    header h1 {
      margin: 0 0 0.25rem;
      font-size: 1.35rem;
      font-weight: 600;
    }
    header p { margin: 0; color: var(--muted); font-size: 0.9rem; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      margin-top: 1rem;
    }
    label { font-size: 0.85rem; color: var(--muted); }
    select, button {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 0.75rem;
      font-size: 0.9rem;
    }
    button {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      cursor: pointer;
      font-weight: 500;
    }
    button:hover { filter: brightness(1.08); }
    main { padding: 1.5rem; max-width: 1100px; margin: 0 auto; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.25rem;
    }
    .card h3 {
      margin: 0 0 0.5rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      font-weight: 600;
    }
    .card .value { font-size: 1.65rem; font-weight: 700; }
    .card.income .value { color: var(--income); }
    .card.expense .value { color: var(--expense); }
    .card.balance .value { color: var(--balance); }
    .card .sub { font-size: 0.8rem; color: var(--muted); margin-top: 0.35rem; }
    section h2 {
      font-size: 1rem;
      margin: 0 0 0.75rem;
      color: var(--muted);
    }
    .bars { display: flex; flex-direction: column; gap: 0.5rem; }
    .bar-row {
      display: grid;
      grid-template-columns: 120px 1fr 64px;
      gap: 0.75rem;
      align-items: center;
      font-size: 0.85rem;
    }
    .bar-track {
      height: 10px;
      background: var(--bg);
      border-radius: 6px;
      overflow: hidden;
    }
    .bar-fill { height: 100%; border-radius: 6px; }
    .bar-fill.income { background: var(--income); }
    .bar-fill.expense { background: var(--expense); }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    th, td {
      text-align: left;
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    th { color: var(--muted); font-weight: 600; }
    .badge {
      display: inline-block;
      padding: 0.15rem 0.45rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge.income { background: rgba(34, 197, 94, 0.2); color: var(--income); }
    .badge.expense { background: rgba(239, 68, 68, 0.2); color: var(--expense); }
    .error-box {
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.35);
      color: #fca5a5;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 700px) {
      .two-col { grid-template-columns: 1fr; }
      .bar-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Personal Finance Tracker</h1>
    <p>Live data from your Flask API — pick a role to match RBAC behavior.</p>
    <div class="toolbar">
      <div>
        <label for="role">Role header</label><br />
        <select id="role">
          <option value="viewer">viewer (read-only)</option>
          <option value="analyst">analyst (read + summaries)</option>
          <option value="admin">admin (full)</option>
        </select>
      </div>
      <div style="align-self: flex-end;">
        <button type="button" id="refresh">Refresh data</button>
      </div>
    </div>
  </header>
  <main>
    <div id="err" class="error-box" style="display:none;"></div>

    <div class="grid">
      <div class="card income">
        <h3>Total income</h3>
        <div class="value" id="totalIncome">—</div>
        <div class="sub" id="incomeNote">Analyst or admin only</div>
      </div>
      <div class="card expense">
        <h3>Total expense</h3>
        <div class="value" id="totalExpense">—</div>
        <div class="sub" id="expenseNote">Analyst or admin only</div>
      </div>
      <div class="card balance">
        <h3>Net balance</h3>
        <div class="value" id="balance">—</div>
        <div class="sub">Income − expense</div>
      </div>
    </div>

    <div class="two-col">
      <section>
        <h2>Income by category</h2>
        <div class="card">
          <div id="incomeCats" class="bars"></div>
        </div>
      </section>
      <section>
        <h2>Expense by category</h2>
        <div class="card">
          <div id="expenseCats" class="bars"></div>
        </div>
      </section>
    </div>

    <section style="margin-top:1.5rem;">
      <h2>Recent records</h2>
      <div class="card" style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Type</th>
              <th>Amount</th>
              <th>Category</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="recordsBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const base = ""; // same origin as Flask

    function role() {
      return document.getElementById("role").value;
    }

    function showErr(msg) {
      const el = document.getElementById("err");
      if (!msg) {
        el.style.display = "none";
        el.textContent = "";
        return;
      }
      el.style.display = "block";
      el.textContent = msg;
    }

    async function api(path, opts = {}) {
      const headers = {
        role: role(),
        Accept: "application/json",
        ...opts.headers,
      };
      const res = await fetch(base + path, { ...opts, headers });
      const text = await res.text();
      let data;
      try {
        data = text ? JSON.parse(text) : {};
      } catch {
        data = { error: text || res.statusText };
      }
      if (!res.ok) {
        const err = new Error(data.error || res.statusText || "Request failed");
        err.status = res.status;
        err.body = data;
        throw err;
      }
      return data;
    }

    function fmtMoney(n) {
      if (n == null || Number.isNaN(Number(n))) return "—";
      return Number(n).toLocaleString(undefined, {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2,
      });
    }

    function maxTotal(rows) {
      if (!rows || !rows.length) return 1;
      return Math.max(...rows.map((r) => Number(r.total) || 0), 1);
    }

    function renderBars(containerId, rows, kind) {
      const el = document.getElementById(containerId);
      el.innerHTML = "";
      if (!rows || !rows.length) {
        el.innerHTML = '<p style="margin:0;color:var(--muted);font-size:0.9rem;">No data</p>';
        return;
      }
      const max = maxTotal(rows);
      rows.forEach((r) => {
        const pct = (Number(r.total) / max) * 100;
        const row = document.createElement("div");
        row.className = "bar-row";
        row.innerHTML = `
          <span>${escapeHtml(String(r.category))}</span>
          <div class="bar-track"><div class="bar-fill ${kind}" style="width:${pct}%"></div></div>
          <span>${fmtMoney(r.total)}</span>
        `;
        el.appendChild(row);
      });
    }

    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    async function load() {
      showErr("");
      const r = role();

      // Balance + category (all roles)
      try {
        const bal = await api("/summary/balance");
        document.getElementById("balance").textContent = fmtMoney(bal.balance);
      } catch (e) {
        document.getElementById("balance").textContent = "—";
        showErr(e.message);
      }

      try {
        const cat = await api("/summary/category");
        renderBars("incomeCats", cat.income_by_category || [], "income");
        renderBars("expenseCats", cat.expense_by_category || [], "expense");
      } catch (e) {
        document.getElementById("incomeCats").innerHTML = "";
        document.getElementById("expenseCats").innerHTML = "";
        showErr(e.message);
      }

      // Income / expense totals (analyst + admin only)
      document.getElementById("incomeNote").textContent =
        r === "viewer" ? "Not available for viewer (403)" : "From /summary/income";
      document.getElementById("expenseNote").textContent =
        r === "viewer" ? "Not available for viewer (403)" : "From /summary/expense";

      if (r === "viewer") {
        document.getElementById("totalIncome").textContent = "—";
        document.getElementById("totalExpense").textContent = "—";
      } else {
        try {
          const inc = await api("/summary/income");
          document.getElementById("totalIncome").textContent = fmtMoney(inc.total_income);
        } catch (e) {
          document.getElementById("totalIncome").textContent = "—";
        }
        try {
          const exp = await api("/summary/expense");
          document.getElementById("totalExpense").textContent = fmtMoney(exp.total_expense);
        } catch (e) {
          document.getElementById("totalExpense").textContent = "—";
        }
      }

      // Records list
      try {
        const rec = await api("/records");
        const tbody = document.getElementById("recordsBody");
        tbody.innerHTML = "";
        const list = (rec.records || []).slice(0, 50);
        if (!list.length) {
          tbody.innerHTML =
            '<tr><td colspan="5" style="color:var(--muted)">No records yet. Create via Postman (admin + JWT).</td></tr>';
        } else {
          list.forEach((row) => {
            const tr = document.createElement("tr");
            const amt = row.amount != null ? row.amount : "";
            tr.innerHTML = `
              <td>${escapeHtml(String(row.id))}</td>
              <td><span class="badge ${row.type}">${escapeHtml(String(row.type))}</span></td>
              <td>${escapeHtml(String(amt))}</td>
              <td>${escapeHtml(String(row.category || ""))}</td>
              <td>${escapeHtml(String(row.date || ""))}</td>
            `;
            tbody.appendChild(tr);
          });
        }
      } catch (e) {
        document.getElementById("recordsBody").innerHTML =
          '<tr><td colspan="5" style="color:#fca5a5">' + escapeHtml(e.message) + "</td></tr>";
      }
    }

    document.getElementById("refresh").addEventListener("click", load);
    document.getElementById("role").addEventListener("change", load);
    load();
  </script>
</body>
</html>
